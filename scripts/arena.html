// ═════════════════════════════════════════════════
// PERSISTENCE (localStorage / sessionStorage)
// ═════════════════════════════════════════════════
const persist = {
  get(key) { try { return JSON.parse(localStorage.getItem('tradearena_' + key)); } catch(e) { return null; } },
  set(key, val) { try { localStorage.setItem('tradearena_' + key, JSON.stringify(val)); } catch(e) {} },
  session(key, val) {
    if (val === undefined) { try { return sessionStorage.getItem('tradearena_' + key); } catch(e) { return null; } }
    try { sessionStorage.setItem('tradearena_' + key, val); } catch(e) {}
  },
};

// Restore mute state
(function restoreMute() {
  const saved = persist.get('muted');
  if (saved === true) {
    soundMuted = true;
    const btn = document.getElementById('mute-btn');
    if (btn) { btn.textContent = '♪ OFF'; btn.style.color = 'var(--red)'; }
  }
  if (!persist.get('session_start')) persist.set('session_start', Date.now());
})();

// Hook mute toggle to persist
const _origToggleMute = toggleMute;
toggleMute = function() { _origToggleMute(); persist.set('muted', soundMuted); };

// Battle history helpers
function saveBattleResult(winner, loser, rounds) {
  const history = persist.get('battle_history') || [];
  history.unshift({
    winner: winner.creator.display_name || winner.creator.creator_id || '?',
    loser: loser.creator.display_name || loser.creator.creator_id || '?',
    date: new Date().toLocaleDateString(),
    rounds,
  });
  if (history.length > 10) history.length = 10;
  persist.set('battle_history', history);
}

// Save scores after data refresh
function persistScores() {
  const scores = {};
  agents.forEach(ag => { scores[ag.creator.creator_id] = ag.creator.composite_score || 0; });
  persist.set('scores', scores);
}

// ═════════════════════════════════════════════════
// BATTLE HISTORY MODAL
// ═════════════════════════════════════════════════
function showBattleHistory() {
  const modal = document.getElementById('bh-modal');
  const body = document.getElementById('bh-body');
  body.innerHTML = '';
  const history = persist.get('battle_history') || [];
  if (!history.length) {
    body.innerHTML = '<div class="bh-empty">No battles yet — challenge a trader!</div>';
  } else {
    history.forEach(h => {
      const row = document.createElement('div'); row.className = 'bh-row';
      row.innerHTML = `<span class="bh-winner">${h.winner}</span><span class="bh-vs">vs</span><span class="bh-loser">${h.loser}</span><span class="bh-date">${h.date}</span>`;
      body.appendChild(row);
    });
  }
  modal.classList.add('show');
}
function closeBhModal() { document.getElementById('bh-modal').classList.remove('show'); }

// ═════════════════════════════════════════════════
// TITLE SCREEN
// ═════════════════════════════════════════════════
let titleDismissed = false;
function initTitleScreen() {
  const ts = document.getElementById('title-screen');
  if (!ts) return;

  // Skip if already shown this session
  if (persist.session('titleShown')) {
    ts.style.display = 'none';
    titleDismissed = true;
    return;
  }

  // Populate dummy ticker
  const tickerInner = document.getElementById('title-ticker-inner');
  const tickers = [
    { sym: 'AAPL', price: '189.42', up: true },
    { sym: 'TSLA', price: '248.31', up: false },
    { sym: 'BTC', price: '67,420', up: true },
    { sym: 'ETH', price: '3,891', up: true },
    { sym: 'NVDA', price: '721.08', up: true },
    { sym: 'SPY', price: '502.11', up: false },
    { sym: 'DOGE', price: '0.142', up: false },
    { sym: 'SOL', price: '148.92', up: true },
  ];
  // Double for seamless loop
  [...tickers, ...tickers].forEach(t => {
    const span = document.createElement('span');
    span.className = 'title-ticker-item';
    span.innerHTML = `${t.sym} <span class="${t.up ? 'title-ticker-up' : 'title-ticker-dn'}">${t.up ? '▲' : '▼'} $${t.price}</span>`;
    tickerInner.appendChild(span);
  });

  // Draw bull & bear on title canvas
  const tc = document.getElementById('title-canvas');
  const tctx = tc.getContext('2d');
  tctx.imageSmoothingEnabled = false;
  let titleFrame = 0;
  function drawTitleSprites() {
    if (titleDismissed) return;
    tctx.clearRect(0, 0, 256, 96);
    titleFrame++;
    const f = Math.floor(titleFrame / 30) % 2;

    // Bull (left side) — simple pixel art
    const bx = 48, by = 20;
    tctx.fillStyle = '#10B981';
    // Body
    tctx.fillRect(bx, by + 16 + f*2, 32, 20);
    // Head
    tctx.fillRect(bx + 24, by + 8 + f*2, 16, 16);
    // Horns
    tctx.fillRect(bx + 26, by + f*2, 4, 10);
    tctx.fillRect(bx + 36, by + f*2, 4, 10);
    // Legs
    tctx.fillRect(bx + 4, by + 36 + f*2, 6, 12 - f*2);
    tctx.fillRect(bx + 22, by + 36 + f*2, 6, 12 - f*2);
    // Eye
    tctx.fillStyle = '#fff';
    tctx.fillRect(bx + 32, by + 14 + f*2, 4, 4);

    // Bear (right side)
    const rx = 160, ry = 20;
    tctx.fillStyle = '#EF4444';
    // Body
    tctx.fillRect(rx, ry + 16 - f*2, 32, 22);
    // Head
    tctx.fillRect(rx - 8, ry + 8 - f*2, 16, 16);
    // Ears
    tctx.fillRect(rx - 8, ry + 2 - f*2, 6, 8);
    tctx.fillRect(rx + 2, ry + 2 - f*2, 6, 8);
    // Legs
    tctx.fillRect(rx + 4, ry + 38 - f*2, 6, 12 + f*2);
    tctx.fillRect(rx + 22, ry + 38 - f*2, 6, 12 + f*2);
    // Eye
    tctx.fillStyle = '#fff';
    tctx.fillRect(rx - 2, ry + 14 - f*2, 4, 4);

    // VS text
    tctx.font = '16px "Press Start 2P",monospace';
    tctx.fillStyle = '#FFD700';
    tctx.textAlign = 'center';
    tctx.shadowColor = 'rgba(255,215,0,0.5)';
    tctx.shadowBlur = 8;
    tctx.fillText('VS', 128, 45);
    tctx.shadowBlur = 0;

    requestAnimationFrame(drawTitleSprites);
  }
  drawTitleSprites();

  // Apply day/night to title background
  const dn = getDayNightOverlay();
  ts.style.background = `linear-gradient(${dn.color}, #0a0a1a)`;

  // Dismiss handler
  function dismissTitle() {
    if (titleDismissed) return;
    titleDismissed = true;
    persist.session('titleShown', 'true');
    ts.classList.add('hidden');
    if (!ambientStarted && !soundMuted) startAmbient();
    playSound('panelOpen');
    setTimeout(() => { ts.style.display = 'none'; }, 500);
    ts.removeEventListener('click', dismissTitle);
    document.removeEventListener('keydown', dismissKey);
  }
  function dismissKey(e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); dismissTitle(); } }
  ts.addEventListener('click', dismissTitle);
  document.addEventListener('keydown', dismissKey);
}

// ═════════════════════════════════════════════════
// TRAINER CARD SPRITE in panel
// ═════════════════════════════════════════════════
function drawPanelSprite(ag) {
  const pc = document.getElementById('ph-sprite');
  if (!pc) return;
  const pctx = pc.getContext('2d');
  pctx.clearRect(0, 0, 48, 72);
  pctx.imageSmoothingEnabled = false;
  const sheet = img['char' + ag.sheetIdx];
  if (!sheet || !sheet.naturalWidth) return;
  const sx = ag.bCol * 3 * CFW + CFW; // middle frame (idle)
  const sy = ag.bRow * 4 * CFH; // facing down
  if (sx + CFW <= sheet.naturalWidth && sy + CFH <= sheet.naturalHeight) {
    pctx.drawImage(sheet, sx, sy, CFW, CFH, 0, 0, 48, 72);
  }
}

// ═════════════════════════════════════════════════
// AMBIENT LIFE — phone ring, paper particles
// ═════════════════════════════════════════════════
let phoneRingTimer = 15000 + Math.random() * 30000;
let phoneRingAgent = null;
let phoneRingT = 0;
let paperTimer = 45000 + Math.random() * 45000;

function updateAmbientLife(dt) {
  // Phone ring on random desk
  phoneRingTimer -= dt;
  if (phoneRingTimer <= 0 && agents.length) {
    phoneRingAgent = agents[Math.floor(Math.random() * agents.length)];
    phoneRingT = 3000;
    phoneRingTimer = 30000 + Math.random() * 30000;
  }
  if (phoneRingT > 0) {
    phoneRingT -= dt;
    if (phoneRingT <= 0) phoneRingAgent = null;
  }

  // Occasional paper particle (Phaser)
  paperTimer -= dt;
  if (paperTimer <= 0 && gameScene) {
    const px = Math.random() * ROOM_W * TS * S;
    const paper = gameScene.add.rectangle(px, -10, 3 * S, 3 * S, 0xffffff, 0.3);
    paper.setDepth(951);
    gameScene.tweens.add({
      targets: paper,
      x: px + (Math.random() - 0.5) * 120,
      y: ROOM_H * TS * S + 20,
      alpha: 0,
      duration: 8000,
      ease: 'Linear',
      onComplete: () => paper.destroy(),
    });
    paperTimer = 60000 + Math.random() * 30000;
  }
}

  if (booted || loadCount < loadTotal) return;
  booted = true;
  console.log('[TradeArena] Booting — loaded', loadCount, '/', loadTotal, 'assets (img{} loader)');
  // Phaser takes over: grid, floor, furniture, loadData, and render loop
  // are all initialized inside GameScene.create()
  createPhaserGame();
}
setTimeout(() => {
  if (!booted) {
    booted = true;
    console.log('[TradeArena] Fallback boot (5s timeout)');
    createPhaserGame();
  }
}, 5000);
