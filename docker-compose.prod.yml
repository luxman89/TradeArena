# Production Docker Compose for Hetzner VPS
#
# IP-only mode (no domain yet):
#   docker compose -f docker-compose.prod.yml up -d
#
# SSL mode (after domain + DNS configured):
#   docker compose -f docker-compose.prod.yml --profile ssl up -d

services:
  app:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://tradearena:${POSTGRES_PASSWORD}@postgres:5432/tradearena
      ENFORCE_HTTPS: ${ENFORCE_HTTPS:-0}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://tradearena.duckdns.org,https://www.tradearena.duckdns.org}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal
      - caddy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tradearena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tradearena
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradearena"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  # IP-only nginx (default, no SSL)
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/nginx-ip.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal

  # SSL nginx (activate with --profile ssl)
  nginx-ssl:
    image: nginx:1.27-alpine
    profiles: ["ssl"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal

  certbot:
    image: certbot/certbot
    profiles: ["ssl"]
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  certbot-webroot:
  certbot-certs:

networks:
  internal:
    driver: bridge
  caddy:
    external: true
    name: deploy_default
